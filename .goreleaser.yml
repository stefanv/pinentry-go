version: 2

project_name: pinentry-go

before:
  hooks:
    - go mod tidy

builds:
  - id: pinentry-go
    main: ./cmd/pinentry-go
    binary: pinentry-go
    env:
      - CGO_ENABLED=1
    goos:
      - linux
    goarch:
      - amd64
    ldflags:
      - -s -w -X main.version={{.Version}}

archives:
  - id: pinentry-go
    formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"
    files:
      - LICENSE
      - README.md

checksum:
  name_template: "checksums.txt"

changelog:
  sort: asc
